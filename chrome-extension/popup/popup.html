<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 300px; padding: 15px; background: #0B0F14; color: #E8E8E8; font-family: sans-serif; }
        .header { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; color: #4DA3FF; font-weight: bold; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; }
        .domain { font-size: 16px; font-weight: bold; margin-bottom: 4px; }
        .score-badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; background: #2EE59D; color: #000; font-weight: bold; }
        .reasons { margin-top: 10px; font-size: 12px; color: #8892A4; list-style: none; padding: 0; }
        .reasons li { margin-bottom: 4px; display: flex; align-items: center; gap: 4px; }
        .btn { display: block; width: 100%; padding: 8px; margin-top: 10px; border-radius: 4px; border: none; cursor: pointer; text-align: center; font-weight: bold; text-decoration: none; font-size: 12px; }
        .btn-primary { background: #4DA3FF; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <span>🛡️</span> ShadowMap AI
    </div>
    <div class="card">
        <div id="domain" class="domain">example.com</div>
        <div id="risk-badge" class="score-badge">LOW RISK</div>
        <ul id="reasons" class="reasons"></ul>
        <div class="btn btn-primary">Press F4 for Details</div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
